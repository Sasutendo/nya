<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#faeef2" />
    <meta name="description" content="Nya Yuuki's Learning Corner – presentations, study notes and projects from nursing training." />
    <meta property="og:title" content="Nya Yuuki's Learning Corner" />
    <meta property="og:description" content="A cute-modern learning corner for nursing presentations, notes, projects and milestones." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-card.svg" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      try {
        const savedTheme = localStorage.getItem('nya-theme');
        document.documentElement.dataset.theme = savedTheme === 'light' || savedTheme === 'dark'
          ? savedTheme
          : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      } catch (_) {}
    </script>
    <title>Nya Yuuki's Learning Corner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
